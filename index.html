<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高效學習卡組 - Smart Learning Cards</title>
  
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Tailwind CSS & React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      background-color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const apiKey = ""; 

    async function callGeminiAPI(promptText, systemInstruction = "") {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: promptText }] }],
        systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined
      };

      let retries = 5, delay = 1000;
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(res => setTimeout(res, delay));
          delay *= 2;
        }
      }
    }

    function BrainLogo({ className = "w-10 h-10" }) {
      return (
        <svg className={className} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="28" fill="url(#blue-apple-brain)"/>
          <circle cx="50" cy="50" r="38" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" strokeWidth="2" />
          <path d="M38 35C33 35 29 39 29 44C29 46.5 30 48.7 31.5 50.3C30 51.8 29 54 29 56.5C29 61.2 32.8 65 37.5 65C38.6 65 39.6 64.8 40.5 64.4C41.8 68.2 45.4 71 49.7 71C53 71 55.8 69.4 57.5 67C59 68.2 60.8 69 62.8 69C67.8 69 71.8 65 71.8 60C71.8 58.8 71.5 57.6 71 56.5C73.3 54.8 74.8 52 74.8 48.8C74.8 44.2 71 40.5 66.4 40.5C65.8 40.5 65.3 40.6 64.8 40.7C63.4 36.8 59.7 34 55.3 34C52.4 34 49.8 35.4 48.1 37.5C46.7 36.6 45 36 43.1 36C41.2 36 39.5 36.6 38.1 37.6Z" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"/>
          <path d="M50 35V71M37 45C43 45 50 41 50 41M35 56C42 56 50 52 50 52M63 45C57 45 50 49 50 49M65 56C58 56 50 60 50 60" stroke="white" strokeWidth="2.5" opacity="0.85" strokeLinecap="round"/>
          <circle cx="38" cy="44" r="2.5" fill="#38BDF8"/>
          <circle cx="66" cy="40.5" r="2.5" fill="#38BDF8"/>
          <circle cx="50" cy="71" r="2.5" fill="#38BDF8"/>
          <defs>
            <linearGradient id="blue-apple-brain" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
              <stop stopColor="#007AFF"/>
              <stop offset="0.6" stopColor="#2563EB"/>
              <stop offset="1" stopColor="#0F172A"/>
            </linearGradient>
          </defs>
        </svg>
      );
    }

    const DECK_COLORS = [
      { id: 'sky', name: '晴空藍', color: 'from-slate-50 to-sky-50/80', borderColor: 'border-sky-200/80', accentBg: 'bg-sky-600' },
      { id: 'indigo', name: '極光藍', color: 'from-slate-50 to-indigo-50/80', borderColor: 'border-indigo-200/80', accentBg: 'bg-indigo-600' },
      { id: 'teal', name: '鼠尾草綠', color: 'from-slate-50 to-teal-50/80', borderColor: 'border-teal-200/80', accentBg: 'bg-teal-600' },
      { id: 'amber', name: '暖陽杏', color: 'from-slate-50 to-amber-50/80', borderColor: 'border-amber-200/80', accentBg: 'bg-amber-600' },
      { id: 'rose', name: '柔霧粉', color: 'from-slate-50 to-rose-50/80', borderColor: 'border-rose-200/80', accentBg: 'bg-rose-600' },
      { id: 'purple', name: '薰衣草紫', color: 'from-slate-50 to-purple-50/80', borderColor: 'border-purple-200/80', accentBg: 'bg-purple-600' }
    ];

    const TRANSLATIONS = {
      'zh-TW': {
        title: '高效學習卡組',
        subtitle: 'Smart Learning Cards',
        myDecks: '我的牌組',
        aiAgent: 'AI 出題',
        study: '開始複習',
        addCard: '製作卡牌',
        stats: '學習分析',
        addDeck: '+ 新增牌組',
        searchPlaceholder: '搜尋牌組或知識關鍵字...',
        sampleButton: '✨ 載入測試範例牌組',
        dueCards: '到期:',
        totalCards: '總卡片',
        mastered: '精通',
        streak: '連續打卡天數',
        todayCount: '今日完成複習',
        heatmapTitle: '每日複習熱度圖 (最近 30 天)',
        domainTitle: '領域別答對率與熟練度分析',
        exportPack: '📦 匯出考題包 (數位變現)'
      },
      'en': {
        title: 'Smart Learning Cards',
        subtitle: 'Spaced Repetition Flashcards',
        myDecks: 'Decks',
        aiAgent: 'AI Agent',
        study: 'Review',
        addCard: 'Add Card',
        stats: 'Analytics',
        addDeck: '+ New Deck',
        searchPlaceholder: 'Search decks or keywords...',
        sampleButton: '✨ Load Sample Decks',
        dueCards: 'Due:',
        totalCards: 'Cards',
        mastered: 'Mastered',
        streak: 'Day Streak',
        todayCount: 'Reviewed Today',
        heatmapTitle: 'Daily Review Activity (Last 30 Days)',
        domainTitle: 'Category Mastery & Progress',
        exportPack: '📦 Export Card Pack'
      }
    };

    function App() {
      const [lang, setLang] = useState('zh-TW');
      const t = TRANSLATIONS[lang] || TRANSLATIONS['zh-TW'];

      const [decks, setDecks] = useState([]);
      const [cards, setCards] = useState([]);
      const [reviewLogs, setReviewLogs] = useState({});

      const [activeTab, setActiveTab] = useState('decks');
      const [selectedDeckId, setSelectedDeckId] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      const [studyQueue, setStudyQueue] = useState([]);
      const [currentCardIndex, setCurrentCardIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [showHint, setShowHint] = useState(false);
      const [sessionCompleted, setSessionCompleted] = useState(false);

      const [aiTopic, setAiTopic] = useState('');
      const [aiGeneratedCards, setAiGeneratedCards] = useState([]);
      const [isAiGenerating, setIsAiGenerating] = useState(false);
      const [aiTargetDeckId, setAiTargetDeckId] = useState('');

      const [showDeckModal, setShowDeckModal] = useState(false);
      const [editingDeck, setEditingDeck] = useState(null);
      const [deckTitle, setDeckTitle] = useState('');
      const [deckCategory, setDeckCategory] = useState('');
      const [deckDesc, setDeckDesc] = useState('');
      const [deckColorId, setDeckColorId] = useState('sky');

      const [cardDeckId, setCardDeckId] = useState('');
      const [cardFront, setCardFront] = useState('');
      const [cardFrontImg, setCardFrontImg] = useState('');
      const [cardBack, setCardBack] = useState('');
      const [cardBackImg, setCardBackImg] = useState('');
      const [cardHint, setCardHint] = useState('');
      const [cardTags, setCardTags] = useState('');

      useEffect(() => {
        if (decks.length > 0 && !cardDeckId) {
          setCardDeckId(decks[0].id);
          setAiTargetDeckId(decks[0].id);
        }
      }, [decks]);

      const getStreakCount = () => {
        let streak = 0;
        let check = new Date();
        for (let i = 0; i < 365; i++) {
          const dateStr = check.toISOString().split('T')[0];
          if (reviewLogs[dateStr] > 0) {
            streak++;
            check.setDate(check.getDate() - 1);
          } else {
            if (i === 0) {
              check.setDate(check.getDate() - 1);
              continue;
            }
            break;
          }
        }
        return streak;
      };

      const handleLoadSampleData = () => {
        const sampleDeckId = `deck-sample-${Date.now()}`;
        const sampleDeck = {
          id: sampleDeckId,
          title: '🎓 核心考題與重點牌組範例',
          category: '通用考題',
          description: '支援星星置頂、多國語言與 SM-2 間隔重複。',
          colorId: 'sky',
          isStarred: true,
          createdAt: new Date().toISOString()
        };

        const sampleCard = {
          id: `c-${Date.now()}`,
          deckId: sampleDeckId,
          front: '如何將此牌組匯出成 JSON 考題包？',
          frontImg: '',
          back: '在「學習分析」點擊「📦 匯出考題包」，即可將產出的題庫下載備份！',
          backImg: '',
          hint: '點擊卡片可翻面',
          tags: ['操作指南'],
          interval: 1,
          easeFactor: 2.5,
          repetitions: 0,
          dueDate: new Date().toISOString().split('T')[0],
          status: 'new'
        };

        setDecks([sampleDeck, ...decks]);
        setCards([sampleCard, ...cards]);
      };

      const handleSaveDeck = (e) => {
        e.preventDefault();
        if (!deckTitle.trim()) return;

        if (editingDeck) {
          setDecks(decks.map(d => d.id === editingDeck.id ? {
            ...d, title: deckTitle, category: deckCategory || '通用分類', description: deckDesc, colorId: deckColorId
          } : d));
        } else {
          const newDeck = {
            id: `deck-${Date.now()}`,
            title: deckTitle,
            category: deckCategory || '通用分類',
            description: deckDesc,
            colorId: deckColorId,
            isStarred: false,
            createdAt: new Date().toISOString()
          };
          setDecks([newDeck, ...decks]);
        }
        closeDeckModal();
      };

      // 點擊星星 toggle，有星星者自動排在最前面
      const toggleStarDeck = (deckId, e) => {
        e.stopPropagation();
        setDecks(decks.map(d => d.id === deckId ? { ...d, isStarred: !d.isStarred } : d));
      };

      // 同一分類內手動微調順序 (▲ / ▼)
      const moveDeckOrder = (index, direction, e) => {
        e.stopPropagation();
        const sorted = getSortedDecks();
        const targetIndex = direction === 'up' ? index - 1 : index + 1;
        if (targetIndex < 0 || targetIndex >= sorted.length) return;

        // 在原始 decks 中找到對應的兩個 deck 並交換位置
        const currentId = sorted[index].id;
        const targetId = sorted[targetIndex].id;
        
        const origIndex1 = decks.findIndex(d => d.id === currentId);
        const origIndex2 = decks.findIndex(d => d.id === targetId);

        const updated = [...decks];
        const temp = updated[origIndex1];
        updated[origIndex1] = updated[origIndex2];
        updated[origIndex2] = temp;
        setDecks(updated);
      };

      // 排序邏輯：有星星 (isStarred) 的永遠排在最前面
      const getSortedDecks = () => {
        return [...decks].sort((a, b) => {
          if (a.isStarred && !b.isStarred) return -1;
          if (!a.isStarred && b.isStarred) return 1;
          return 0;
        });
      };

      const handleDeleteDeck = (deckId, e) => {
        if (e) e.stopPropagation();
        if (!window.confirm('確定要徹底刪除此牌組及其所有卡片嗎？')) return;
        setDecks(prev => prev.filter(d => d.id !== deckId));
        setCards(prev => prev.filter(c => c.deckId !== deckId));
      };

      const openEditDeckModal = (deck, e) => {
        if (e) e.stopPropagation();
        setEditingDeck(deck);
        setDeckTitle(deck.title);
        setDeckCategory(deck.category);
        setDeckDesc(deck.description || '');
        setDeckColorId(deck.colorId || 'sky');
        setShowDeckModal(true);
      };

      const closeDeckModal = () => {
        setShowDeckModal(false);
        setEditingDeck(null);
        setDeckTitle('');
        setDeckCategory('');
        setDeckDesc('');
        setDeckColorId('sky');
      };

      const handleImageUpload = (e, setImageState) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => setImageState(reader.result);
        reader.readAsDataURL(file);
      };

      const handleCreateCard = (e) => {
        e.preventDefault();
        if (!cardFront.trim() || !cardBack.trim() || !cardDeckId) return;

        const newCard = {
          id: `c-${Date.now()}`,
          deckId: cardDeckId,
          front: cardFront,
          frontImg: cardFrontImg,
          back: cardBack,
          backImg: cardBackImg,
          hint: cardHint,
          tags: cardTags ? cardTags.split(',').map(t => t.trim()) : ['自訂'],
          interval: 1,
          easeFactor: 2.5,
          repetitions: 0,
          dueDate: new Date().toISOString().split('T')[0],
          status: 'new',
          createdAt: new Date().toISOString()
        };

        setCards([...cards, newCard]);
        setCardFront('');
        setCardFrontImg('');
        setCardBack('');
        setCardBackImg('');
        setCardHint('');
        setCardTags('');
        alert('✨ 成功新增記憶卡片！');
      };

      const handleAiGenerateCards = async () => {
        if (!aiTopic.trim()) return alert('請輸入學習主題關鍵字！');
        setIsAiGenerating(true);
        setAiGeneratedCards([]);

        const systemPrompt = `你是一位專業知識記憶卡專家。請產出 3 到 4 張高品質 JSON 格式記憶卡（不要包含 markdown 標籤）：
[{"front": "題目", "back": "解答與解析", "hint": "提示", "tags": ["標籤"]}]`;

        try {
          const res = await callGeminiAPI(`主題：${aiTopic}`, systemPrompt);
          const cleanJson = res.replace(/```json/g, '').replace(/```/g, '').trim();
          setAiGeneratedCards(JSON.parse(cleanJson));
        } catch (err) {
          alert('AI 生成失敗，請稍後重試。');
        } finally {
          setIsAiGenerating(false);
        }
      };

      const handleImportAiCards = () => {
        if (!aiTargetDeckId) return alert('請選擇目標牌組！');
        const batch = aiGeneratedCards.map((c, i) => ({
          id: `c-ai-${Date.now()}-${i}`,
          deckId: aiTargetDeckId,
          front: c.front,
          frontImg: '',
          back: c.back,
          backImg: '',
          hint: c.hint || '',
          tags: c.tags || ['AI生成'],
          interval: 1,
          easeFactor: 2.5,
          repetitions: 0,
          dueDate: new Date().toISOString().split('T')[0],
          status: 'new',
          createdAt: new Date().toISOString()
        }));

        setCards([...cards, ...batch]);
        setAiGeneratedCards([]);
        setAiTopic('');
        alert(`🎉 成功將 ${batch.length} 張卡牌匯入！`);
      };

      const handleExportPack = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ decks, cards }));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `SmartLearningCards_Pack_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(dlAnchor);
        dlAnchor.click();
        dlAnchor.remove();
      };

      const startStudy = (deckId) => {
        setSelectedDeckId(deckId);
        const today = new Date().toISOString().split('T')[0];
        const queue = cards.filter(c => c.deckId === deckId && c.dueDate <= today);
        setStudyQueue(queue.length > 0 ? queue : cards.filter(c => c.deckId === deckId));
        setCurrentCardIndex(0);
        setIsFlipped(false);
        setShowHint(false);
        setSessionCompleted(false);
        setActiveTab('study');
      };

      const handleRating = (quality) => {
        const currentCard = studyQueue[currentCardIndex];
        if (!currentCard) return;

        let { interval, easeFactor, repetitions } = currentCard;
        let newStatus = currentCard.status;

        if (quality === 1) {
          repetitions = 0;
          interval = 1;
          newStatus = 'learning';
        } else {
          if (repetitions === 0) {
            interval = quality === 4 ? 4 : (quality === 3 ? 2 : 1);
          } else {
            interval = Math.round(interval * easeFactor * (quality === 4 ? 1.3 : 1.0));
          }
          easeFactor = Math.max(1.3, easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
          repetitions += 1;
          newStatus = interval >= 21 ? 'mastered' : 'review';
        }

        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + interval);
        const dueDateStr = nextDate.toISOString().split('T')[0];

        const today = new Date().toISOString().split('T')[0];
        setReviewLogs(prev => ({
          ...prev,
          [today]: (prev[today] || 0) + 1
        }));

        setCards(cards.map(c => c.id === currentCard.id ? {
          ...c, interval, easeFactor, repetitions, dueDate: dueDateStr, status: newStatus
        } : c));

        if (currentCardIndex + 1 < studyQueue.length) {
          setCurrentCardIndex(prev => prev + 1);
          setIsFlipped(false);
          setShowHint(false);
        } else {
          setSessionCompleted(true);
        }
      };

      const getDeckStats = (deckId) => {
        const deckCards = cards.filter(c => c.deckId === deckId);
        const today = new Date().toISOString().split('T')[0];
        return {
          total: deckCards.length,
          due: deckCards.filter(c => c.dueDate <= today).length,
          mastered: deckCards.filter(c => c.status === 'mastered').length
        };
      };

      const getCategoryAnalytics = () => {
        const categories = {};
        decks.forEach(deck => {
          const cat = deck.category || (lang === 'en' ? 'General' : '通用分類');
          if (!categories[cat]) {
            categories[cat] = { totalCards: 0, masteredCards: 0, reviewCards: 0, newCards: 0 };
          }
          const deckCards = cards.filter(c => c.deckId === deck.id);
          deckCards.forEach(card => {
            categories[cat].totalCards += 1;
            if (card.status === 'mastered') categories[cat].masteredCards += 1;
            else if (card.status === 'review' || card.status === 'learning') categories[cat].reviewCards += 1;
            else categories[cat].newCards += 1;
          });
        });
        return categories;
      };

      const getPast30Days = () => {
        const days = [];
        for (let i = 29; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          days.push(d.toISOString().split('T')[0]);
        }
        return days;
      };

      const todayStr = new Date().toISOString().split('T')[0];
      const todayReviewCount = reviewLogs[todayStr] || 0;
      const sortedDeckList = getSortedDecks().filter(d => d.title.includes(searchQuery) || (d.description && d.description.includes(searchQuery)));

      return (
        <div className="min-h-screen bg-[#F8FAFC] text-slate-800 pb-24">
          
          <header className="sticky top-0 z-30 bg-white/85 backdrop-blur-md border-b border-slate-200/60 px-4 py-3 sm:px-8">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <BrainLogo className="w-10 h-10 shadow-sm rounded-2xl" />
                <div>
                  <h1 className="text-xl font-bold text-slate-900 tracking-tight">{t.title}</h1>
                  <p className="text-[11px] text-slate-400 font-medium">{t.subtitle}</p>
                </div>
              </div>

              <div className="flex items-center space-x-2">
                <select 
                  value={lang} 
                  onChange={(e) => setLang(e.target.value)}
                  className="px-2.5 py-1.5 rounded-xl text-xs bg-slate-100 border border-slate-200 font-medium cursor-pointer"
                >
                  <option value="zh-TW">繁體中文</option>
                  <option value="en">English</option>
                </select>

                <button 
                  onClick={() => setActiveTab('ai-agent')}
                  className="px-3.5 py-2 rounded-2xl bg-sky-50 text-sky-700 hover:bg-sky-100 text-xs font-semibold border border-sky-200/60 flex items-center space-x-1"
                >
                  <span>🤖 {t.aiAgent}</span>
                </button>
                <button 
                  onClick={() => { setEditingDeck(null); setShowDeckModal(true); }}
                  className="px-4 py-2 rounded-2xl bg-sky-600 text-white hover:bg-sky-700 text-xs font-semibold shadow-sm flex items-center space-x-1"
                >
                  <span>{t.addDeck}</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 pt-6 sm:px-8">
            
            {/* 牌組頁面 */}
            {activeTab === 'decks' && (
              <div className="space-y-5">
                
                <div className="flex flex-col sm:flex-row gap-3 items-center justify-between">
                  <div className="relative w-full sm:w-80">
                    <input 
                      type="text" 
                      placeholder={t.searchPlaceholder}
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full px-4 py-2.5 rounded-2xl bg-white border border-slate-200 text-xs focus:outline-none focus:ring-2 focus:ring-sky-500/20 shadow-xs"
                    />
                  </div>

                  {decks.length === 0 && (
                    <button 
                      onClick={handleLoadSampleData}
                      className="text-xs font-semibold text-sky-600 bg-sky-50 hover:bg-sky-100 px-4 py-2 rounded-2xl border border-sky-200/60"
                    >
                      {t.sampleButton}
                    </button>
                  )}
                </div>

                {decks.length === 0 ? (
                  <div className="p-12 text-center bg-white rounded-[28px] border border-slate-200 shadow-xs space-y-4">
                    <BrainLogo className="w-16 h-16 mx-auto rounded-3xl" />
                    <div className="space-y-1">
                      <h3 className="text-lg font-bold text-slate-900">{t.title}</h3>
                      <p className="text-xs text-slate-500 max-w-md mx-auto">

                    <input 
                      type="text"
                      placeholder="例如：語言檢定高頻單字、歷屆試題彙整..."
                      value={deckTitle}
                      onChange={(e) => setDeckTitle(e.target.value)}
                      className="w-full px-3.5 py-2.5 rounded-2xl border border-slate-200 text-xs focus:outline-none focus:ring-2 focus:ring-sky-500/20"
                      required
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1">分類標籤 / 領域</label>
                    <input 
                      type="text"
                      placeholder="例如：必考單字、核心觀念、重點複習..."
                      value={deckCategory}
                      onChange={(e) => setDeckCategory(e.target.value)}
                      className="w-full px-3.5 py-2.5 rounded-2xl border border-slate-200 text-xs focus:outline-none focus:ring-2 focus:ring-sky-500/20"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1">牌組描述 (選填)</label>
                    <textarea 
                      rows={2}
                      placeholder="記錄此牌組的考試目標或範圍..."
                      value={deckDesc}
                      onChange={(e) => setDeckDesc(e.target.value)}
                      className="w-full px-3.5 py-2 rounded-2xl border border-slate-200 text-xs focus:outline-none focus:ring-2 focus:ring-sky-500/20"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1.5">🎨 選擇牌組主題色彩</label>
                    <div className="flex items-center space-x-2">
                      {DECK_COLORS.map((c) => (
                        <button
                          key={c.id}
                          type="button"
                          onClick={() => setDeckColorId(c.id)}
                          className={`w-7 h-7 rounded-full border-2 transition-all flex items-center justify-center ${c.accentBg} ${deckColorId === c.id ? 'border-slate-800 scale-110' : 'border-transparent opacity-60 hover:opacity-100'}`}
                        >
                          {deckColorId === c.id && <span className="text-white text-[10px]">✓</span>}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="pt-2 flex justify-end space-x-2">
                    <button type="button" onClick={closeDeckModal} className="px-4 py-2 rounded-2xl bg-slate-100 text-slate-600 text-xs font-medium">取消</button>
                    <button type="submit" className="px-5 py-2 rounded-2xl bg-sky-600 text-white text-xs font-semibold shadow-sm">儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* 底部導覽列 */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200/80 px-6 py-2.5 z-30">
            <div className="max-w-md mx-auto flex items-center justify-around">
              <button onClick={() => setActiveTab('decks')} className={`flex flex-col items-center space-y-1 ${activeTab === 'decks' ? 'text-sky-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                <span className="text-base">📚</span>
                <span className="text-[10px]">{t.myDecks}</span>
              </button>

              <button onClick={() => setActiveTab('ai-agent')} className={`flex flex-col items-center space-y-1 ${activeTab === 'ai-agent' ? 'text-sky-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                <span className="text-base">🤖</span>
                <span className="text-[10px]">{t.aiAgent}</span>
              </button>

              <button onClick={() => { if (selectedDeckId) startStudy(selectedDeckId); else if (decks.length > 0) startStudy(decks[0].id); }} className={`flex flex-col items-center space-y-1 ${activeTab === 'study' ? 'text-sky-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                <span className="text-base">📖</span>
                <span className="text-[10px]">{t.study}</span>
              </button>

              <button onClick={() => setActiveTab('add')} className={`flex flex-col items-center space-y-1 ${activeTab === 'add' ? 'text-sky-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                <span className="text-base">➕</span>
                <span className="text-[10px]">{t.addCard}</span>
              </button>

              <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center space-y-1 ${activeTab === 'stats' ? 'text-sky-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                <span className="text-base">📊</span>
                <span className="text-[10px]">{t.stats}</span>
              </button>
            </div>
          </nav>

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
